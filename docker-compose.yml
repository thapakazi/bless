services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    container_name: bless-clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native
    environment:
      CLICKHOUSE_DB: bless
      CLICKHOUSE_USER: bless
      CLICKHOUSE_PASSWORD: bless
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./.clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
